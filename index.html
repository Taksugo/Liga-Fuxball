<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Tournament - Sistema Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- ARSENAL DE COLORES --- */
        :root {
            --bg-void: #030814;
            --bg-stadium: #0a142c;
            --panel-glass: rgba(16, 29, 61, 0.6);
            --cyber-blue: #0052ff;
            --neon-yellow: #fff500;
            --neon-glow: rgba(255, 245, 0, 0.25);
            --text-light: #ffffff;
            --text-muted: #7e8fa9;
            --border-glow: rgba(0, 82, 255, 0.2);
            --win: #00ff85;
            --draw: #7e8fa9;
            --lose: #ff005a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-void);
            color: var(--text-light);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 80%, rgba(255, 245, 0, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding-bottom: 80px;
        }

        header { text-align: center; padding: 40px 20px; }
        .header-logo { max-width: 455px; width: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 4px 20px rgba(0, 82, 255, 0.35)); }

        /* MODIFICADO: Se alargó el contenedor principal a 1600px */
        .container {
            max-width: 1600px; margin: 20px auto; padding: 0 24px;
            display: grid; grid-template-columns: 2.3fr 1.1fr; gap: 40px;
        }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }

        .panel-esports {
            background: var(--panel-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow); border-radius: 20px; padding: 35px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative; overflow: hidden;
        }

        .panel-titulo {
            font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase;
            margin-bottom: 30px; display: flex; align-items: center; gap: 15px;
        }
        .panel-titulo::before { content: '///'; color: var(--neon-yellow); font-weight: 800; letter-spacing: -2px; }

        /* --- TABLA --- */
        .tabla-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; text-align: center; }
        th { font-family: 'Rajdhani', sans-serif; color: var(--text-muted); font-weight: 700; font-size: 1rem; padding: 12px 10px; text-transform: uppercase; }
        tbody tr { cursor: pointer; }
        
        /* MODIFICADO: td ahora tiene fondo transparente para dejar ver el gradiente de la fila tr */
        td { padding: 16px 12px; background-color: rgba(10, 20, 44, 0.35); border-top: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; transition: all 0.25s ease; }
        td:first-child { border-left: 2px solid rgba(255,255,255,0.03); border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
        td:last-child { border-right: 2px solid rgba(255,255,255,0.03); border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
        
        tr:first-child td { border-color: rgba(255, 245, 0, 0.15); }
        tr:first-child .posicion { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-glow); }
        
        /* Al hacer hover se intensifica el fondo */
        tbody tr:hover td { background-color: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.1); }

        .posicion { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.2rem; width: 50px; position: relative; z-index: 2; }
        
        /* MODIFICADO: Preparado para contener la marca de agua del escudo absoluta */
        .col-club { text-align: left; font-weight: 600; position: relative; overflow: hidden; }
        .club-content { display: flex; align-items: center; gap: 15px; position: relative; z-index: 2; }
        .club-content img { width: 32px; height: 32px; object-fit: contain; }
        
        /* NUEVO: Estilos para la marca de agua del escudo inclinada a 60 grados */
        .bg-watermark {
            position: absolute;
            right: 10px;
            top: -35px;
            width: 140px;
            height: 140px;
            object-fit: contain;
            opacity: 0.2; /* Ajusta la transparencia aquí (0.0 a 1.0) */
            transform: rotate(20deg);
            pointer-events: none;
            z-index: 1;
        }

        .pts-destacado { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--neon-yellow); background-color: rgba(0, 0, 0, 0.25); position: relative; z-index: 2; }
        .num-tv { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; position: relative; z-index: 2; }
        .racha-box { display: flex; gap: 5px; justify-content: center; position: relative; z-index: 2; }

        .mini-badge { width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 800; color: #030814; }
        .mini-badge.v { background-color: var(--win); }
        .mini-badge.e { background-color: var(--draw); color: white; }
        .mini-badge.d { background-color: var(--lose); }

        /* --- CALENDARIO --- */
        .fixture-flex { display: flex; flex-direction: column; gap: 25px; }
        .matchweek-card { background-color: rgba(10, 20, 44, 0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; margin-bottom: 20px;}
        .matchweek-header { background: linear-gradient(90deg, var(--cyber-blue), rgba(0, 82, 255, 0.2)); padding: 12px 20px; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid var(--neon-yellow); }
        .partido-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 22px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .partido-row:last-child { border-bottom: none; }
        
        .team-container { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-weight: 600; }
        .team-home { justify-content: flex-end; padding-right: 15px; text-align: right; }
        .team-away { justify-content: flex-start; padding-left: 15px; text-align: left; }
        .match-crest { width: 26px; height: 26px; object-fit: contain; }

        .score-box { background-color: #030814; color: var(--neon-yellow); font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.2rem; padding: 6px 16px; border-radius: 8px; letter-spacing: 3px; min-width: 70px; text-align: center; border: 1px solid rgba(0, 82, 255, 0.4); }
        .vs-box { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.8rem; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; background-color: rgba(16, 29, 61, 0.5); }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(3, 8, 20, 0.88); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: linear-gradient(145deg, #0a142c, #050b18); border: 2px solid var(--cyber-blue); box-shadow: 0 0 40px rgba(0, 82, 255, 0.3); border-radius: 24px; width: 92%; max-width: 580px; padding: 35px; position: relative; transform: translateY(20px); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        
        .btn-cerrar { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.2rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-cerrar:hover { background: var(--lose); }

        .modal-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 25px; margin-bottom: 25px; }
        .modal-header img { width: 110px; height: 110px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(0, 82, 255, 0.4)); }
        .modal-header h3 { font-family: 'Rajdhani', sans-serif; font-size: 2.4rem; font-weight: 800; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center; }
        .stat-box .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-box .valor { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 800; margin-top: 4px; }
        .stat-box.g { border-color: rgba(0, 255, 133, 0.2); color: var(--win); }
        .stat-box.e { border-color: rgba(126, 143, 169, 0.2); color: #ffffff; }
        .stat-box.p { border-color: rgba(255, 0, 90, 0.2); color: var(--lose); }

        .info-block { background: rgba(0, 82, 255, 0.04); border: 1px solid rgba(0, 82, 255, 0.1); border-radius: 14px; padding: 18px; margin-bottom: 20px; }
        .info-block h4 { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: var(--neon-yellow); margin-bottom: 12px; }
        .players-list { display: flex; flex-direction: column; gap: 8px; }
        .player-item { font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .player-item::before { content: '◆'; color: var(--cyber-blue); font-size: 0.8rem; }
        .history-flex { display: flex; justify-content: space-between; font-size: 0.95rem; }
        .history-item span { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: #ffffff; font-size: 1.1rem; }

        /* --- TOOLTIPS DE HISTORIAL --- */
        .racha-diez-container { display: flex; gap: 7px; justify-content: center; margin-top: 5px; }
        .racha-item { position: relative; }
        .modal-badge { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 800; color: #030814; cursor: pointer; transition: transform 0.15s ease; }
        .modal-badge:hover { transform: translateY(-2px); }
        .modal-badge.v { background-color: var(--win); box-shadow: 0 0 8px rgba(0, 255, 133, 0.2); }
        .modal-badge.e { background-color: var(--draw); color: white; }
        .modal-badge.d { background-color: var(--lose); box-shadow: 0 0 8px rgba(255, 0, 90, 0.2); }

        .racha-item .tooltip-box { visibility: hidden; opacity: 0; width: 140px; background-color: #050b18; color: #ffffff; text-align: center; border: 1px solid var(--cyber-blue); border-radius: 8px; padding: 8px; position: absolute; bottom: 135%; left: 50%; transform: translateX(-50%); z-index: 1010; font-size: 0.75rem; box-shadow: 0 10px 20px rgba(0,0,0,0.6); transition: opacity 0.2s ease, visibility 0.2s ease; pointer-events: none; }
        .racha-item .tooltip-box::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: #050b18 transparent transparent transparent; }
        .racha-item:hover .tooltip-box { visibility: visible; opacity: 1; }
        .tooltip-marcador { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1rem; color: var(--neon-yellow); display: block; margin-bottom: 2px; }
        .tooltip-rival { color: var(--text-muted); font-weight: 500; }

        /* Cargando */
        .loading-text { text-align: center; color: var(--text-muted); padding: 40px; font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <img id="mainLogo" class="header-logo" src="https://via.placeholder.com/450x120?text=CARGANDO..." alt="Logo Torneo">
    </header>

    <div class="container">
        <section class="panel-esports">
            <h2 class="panel-titulo">Tabla General</h2>
            <div class="tabla-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="posicion">Pos</th>
                            <th style="text-align: left;">Club</th>
                            <th>PJ</th>
                            <th>G</th>
                            <th>E</th>
                            <th>P</th>
                            <th>GD</th>
                            <th style="color: var(--neon-yellow);">Pts</th>
                            <th>Forma</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        <tr><td colspan="9" class="loading-text">Cargando base de datos de Google Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel-esports">
            <h2 class="panel-titulo">Calendario</h2>
            <div class="fixture-flex" id="fixtureCuerpo">
                <div class="loading-text">Cargando partidos...</div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="perfilModal" onclick="cerrarFicha(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="btn-cerrar" onclick="document.getElementById('perfilModal').classList.remove('active')">×</button>
            <div class="modal-header">
                <img id="modalEscudo" src="" alt="Escudo">
                <h3 id="modalNombre"></h3>
            </div>
            <div class="stats-grid">
                <div class="stat-box g"><div class="label">Ganados</div><div class="valor" id="modalGanados">0</div></div>
                <div class="stat-box e"><div class="label">Empatados</div><div class="valor" id="modalEmpatados">0</div></div>
                <div class="stat-box p"><div class="label">Perdidos</div><div class="valor" id="modalPerdidos">0</div></div>
            </div>
            <div class="info-block">
                <h4>Historial Últimos 10 Partidos (Hover para Detalle)</h4>
                <div class="racha-diez-container" id="modalRachaDiez"></div>
            </div>
            <div class="info-block">
                <h4>Plantilla Oficial</h4>
                <div class="players-list">
                    <div class="player-item" id="player1"></div>
                    <div class="player-item" id="player2"></div>
                </div>
            </div>
            <div class="info-block">
                <h4>Historial en Competición</h4>
                <div class="history-flex">
                    <div class="history-item">Ligas Jugadas: <span id="ligasJugadas">0</span></div>
                    <div class="history-item">Ligas Ganadas: <span id="ligasGanadas" style="color: var(--neon-yellow);">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycby0IbL9gajNMuyfYzvlukV0xmCZSi9Miec-HAuBCowTCRaFTZAJKrm9LeYIDR-0JfOC/exec";

        let dbLocal = {}; 

        async function cargarDatos() {
            try {
                const response = await fetch(URL_API_SHEETS);
                const data = await response.json();
                
                const config = data.Config.reduce((acc, curr) => ({...acc, [curr.clave]: curr.valor}), {});
                if(config.logo_url) document.getElementById('mainLogo').src = config.logo_url;
                if(config.fondo_url) document.body.style.backgroundImage = `url('${config.fondo_url}')`;

                let equiposData = {};
                data.Equipos.forEach(eq => {
                    equiposData[eq.id] = {
                        id: eq.id,
                        nombre: eq.nombre,
                        escudo: eq.escudo,
                        jugador1: eq.jugador1,
                        jugador2: eq.jugador2,
                        ligas_jugadas: eq.ligas_jugadas,
                        ligas_ganadas: eq.ligas_ganadas,
                        color: eq.color || '#0052ff', // NUEVO: Captura el color de Sheets (usa azul por defecto)
                        pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, gd: 0, pts: 0,
                        historialDiez: [] 
                    };
                });

                data.Calendario.forEach(partido => {
                    const locId = partido.local_id;
                    const visId = partido.visitante_id;
                    const gLoc = parseInt(partido.goles_local);
                    const gVis = parseInt(partido.goles_visitante);
                    
                    if (partido.jugado === "SI" || partido.jugado === true) {
                        if(equiposData[locId]) {
                            const eqL = equiposData[locId];
                            eqL.pj++; eqL.gf += gLoc; eqL.gc += gVis;
                            if(gLoc > gVis) { eqL.g++; eqL.pts += 3; eqL.historialDiez.push({resultado:'v', marcador:`${gLoc}-${gVis}`, rival: equiposData[visId]?.nombre || visId}); }
                            else if(gLoc === gVis) { eqL.e++; eqL.pts += 1; eqL.historialDiez.push({resultado:'e', marcador:`${gLoc}-${gVis}`, rival: equiposData[visId]?.nombre || visId}); }
                            else { eqL.p++; eqL.historialDiez.push({resultado:'d', marcador:`${gLoc}-${gVis}`, rival: equiposData[visId]?.nombre || visId}); }
                        }
                        if(equiposData[visId]) {
                            const eqV = equiposData[visId];
                            eqV.pj++; eqV.gf += gVis; eqV.gc += gLoc;
                            if(gVis > gLoc) { eqV.g++; eqV.pts += 3; eqV.historialDiez.push({resultado:'v', marcador:`${gVis}-${gLoc}`, rival: equiposData[locId]?.nombre || locId}); }
                            else if(gVis === gLoc) { eqV.e++; eqV.pts += 1; eqV.historialDiez.push({resultado:'e', marcador:`${gVis}-${gLoc}`, rival: equiposData[locId]?.nombre || locId}); }
                            else { eqV.p++; eqV.historialDiez.push({resultado:'d', marcador:`${gVis}-${gLoc}`, rival: equiposData[locId]?.nombre || locId}); }
                        }
                    }
                });

                Object.values(equiposData).forEach(eq => {
                    eq.gd = eq.gf - eq.gc;
                    eq.historialDiez = eq.historialDiez.slice(-10); 
                });

                dbLocal = equiposData;

                const listaOrdenada = Object.values(equiposData).sort((a,b) => b.pts - a.pts || b.gd - a.gd);
                renderizarTabla(listaOrdenada);
                renderizarCalendario(data.Calendario, equiposData);

            } catch (error) {
                console.error("Error cargando base de datos de Sheets:", error);
                document.getElementById('tablaCuerpo').innerHTML = `<tr><td colspan="9" style="color:var(--lose);">Error de conexión con Google Sheets. Revisa la URL de la API.</td></tr>`;
            }
        }

        function renderizarTabla(equipos) {
            const tbody = document.getElementById('tablaCuerpo');
            tbody.innerHTML = '';

            equipos.forEach((eq, index) => {
                const pos = String(index + 1).padStart(2, '0');
                const ultimosPartidos = eq.historialDiez.slice(-3); 
                let rachaHtml = '';
                ultimosPartidos.forEach(p => {
                    rachaHtml += `<div class="mini-badge ${p.resultado}">${p.resultado.toUpperCase()}</div>`;
                });

                // TRUCO: Agregamos el canal Alfa "1F" al color hexadecimal para que sea semi-transparente (~12% opacidad)
                const gradienteColor = `${eq.color}1F`; 

                const tr = document.createElement('tr');
                tr.setAttribute('onclick', `mostrarFicha('${eq.id}')`);
                
                // MODIFICADO: Aplicación del gradiente personalizado desde la izquierda hasta la mitad (50%)
                tr.style.background = `linear-gradient(90deg, ${gradienteColor} 0%, transparent 50%)`;

                tr.innerHTML = `
                    <td class="posicion">${pos}</td>
                    <td class="col-club">
                        <img class="bg-watermark" src="${eq.escudo || ''}" alt="">
                        
                        <div class="club-content">
                            <img src="${eq.escudo || 'https://via.placeholder.com/32'}" alt="Escudo">
                            <span>${eq.nombre}</span>
                        </div>
                    </td>
                    <td class="num-tv">${eq.pj}</td>
                    <td class="num-tv">${eq.g}</td>
                    <td class="num-tv">${eq.e}</td>
                    <td class="num-tv">${eq.p}</td>
                    <td class="num-tv" style="color: ${eq.gd >= 0 ? 'var(--win)' : 'var(--lose)'};">${eq.gd > 0 ? '+' : ''}${eq.gd}</td>
                    <td class="pts-destacado">${eq.pts}</td>
                    <td><div class="racha-box">${rachaHtml || '-'}</div></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderizarCalendario(partidosRaw, equiposData) {
            const container = document.getElementById('fixtureCuerpo');
            container.innerHTML = '';

            const jornadas = {};
            partidosRaw.forEach(p => {
                if(!jornadas[p.jornada]) jornadas[p.jornada] = [];
                jornadas[p.jornada].push(p);
            });

            Object.keys(jornadas).forEach(jornadaNombre => {
                const card = document.createElement('div');
                card.className = 'matchweek-card';
                card.innerHTML = `<div class="matchweek-header">${jornadaNombre}</div>`;

                jornadas[jornadaNombre].forEach(partido => {
                    const eqL = equiposData[partido.local_id] || { nombre: partido.local_id, escudo: 'https://via.placeholder.com/26?text=X' };
                    const eqV = equiposData[partido.visitante_id] || { nombre: partido.visitante_id, escudo: 'https://via.placeholder.com/26?text=X' };
                    
                    let scoreHtml = `<div class="vs-box">VS</div>`;
                    if(partido.jugado === "SI" || partido.jugado === true) {
                        scoreHtml = `<div class="score-box">${partido.goles_local}-${partido.goles_visitante}</div>`;
                    }

                    const row = document.createElement('div');
                    row.className = 'partido-row';
                    row.innerHTML = `
                        <div class="team-container team-home">
                            <span>${eqL.nombre}</span>
                            <img class="match-crest" src="${eqL.escudo}" alt="L">
                        </div>
                        <div class="score-display">${scoreHtml}</div>
                        <div class="team-container team-away">
                            <img class="match-crest" src="${eqV.escudo}" alt="V">
                            <span>${eqV.nombre}</span>
                        </div>
                    `;
                    card.appendChild(row);
                });

                container.appendChild(card);
            });
        }

        function mostrarFicha(idEquipo) {
            const equipo = dbLocal[idEquipo];
            if (!equipo) return;

            document.getElementById('modalNombre').innerText = equipo.nombre;
            document.getElementById('modalEscudo').src = equipo.escudo;
            document.getElementById('modalGanados').innerText = equipo.g;
            document.getElementById('modalEmpatados').innerText = equipo.e;
            document.getElementById('modalPerdidos').innerText = equipo.p;
            document.getElementById('player1').innerText = equipo.jugador1 || 'No inscrito';
            document.getElementById('player2').innerText = equipo.jugador2 || 'No inscrito';
            document.getElementById('ligasJugadas').innerText = equipo.ligas_jugadas || 0;
            document.getElementById('ligasGanadas').innerText = equipo.ligas_ganadas || 0;

            const rachaContainer = document.getElementById('modalRachaDiez');
            rachaContainer.innerHTML = '';

            if(equipo.historialDiez.length === 0) {
                rachaContainer.innerHTML = '<span style="color:var(--text-muted); font-size:0.9rem;">Sin partidos jugados</span>';
            }

            equipo.historialDiez.forEach(partido => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'racha-item';

                const badge = document.createElement('div');
                badge.className = `modal-badge ${partido.resultado}`;
                badge.innerText = partido.resultado.toUpperCase();

                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip-box';
                let estadoTexto = partido.resultado === 'v' ? 'Ganó' : partido.resultado === 'e' ? 'Empató' : 'Perdió';

                tooltip.innerHTML = `
                    <span class="tooltip-marcador">${estadoTexto} ${partido.marcador}</span>
                    <span class="tooltip-rival">vs ${partido.rival}</span>
                `;

                itemDiv.appendChild(badge);
                itemDiv.appendChild(tooltip);
                rachaContainer.appendChild(itemDiv);
            });

            document.getElementById('perfilModal').classList.add('active');
        }

        function cerrarFicha(event) {
            document.getElementById('perfilModal').classList.remove('active');
        }

        cargarDatos();
    </script>
</body>
</html>
